<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<title>Notion Widget</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  display: flex;
  justify-content: center;
  font-family: Arial, sans-serif;
}

/* CONTAINER */
  .container {
    width: 200px;
    display: flex;
    flex-direction: column;
    gap: 0;   /* ✅ clean space between clock & calendar */
  }

/* CLOCK */
.clock {
  display: flex;
  gap: 3px;
  position: relative;
  margin-bottom: 15px; /* 🔥 removes gap */
}
  
  .clock::after {
    content: "";
    position: absolute;
    
    top: 50%;
    left: 0;
    width: 100%;
    
    height: 2px;   /* 🔥 thin like real flip */
    background: rgba(255, 255, 255, 0.2);
    
    transform: translateY(-50%);
    z-index: 2;
  }

.box {
  flex: 1;
  background: #A5BC85;
  color: white;
  height: 140px; 
  padding: 30px 0;
  text-align: center;
  position: relative;
  border-radius: 6px;
}

/* soft divider (NOT gap) */
.box + .box {
  border-left: 2px solid rgba(255,255,255,0.2);
}

.time {
  font-family: 'Bebas Neue', sans-serif; 
  font-size: 72px;      /* 🔥 bigger */
  font-weight: 800;     /* extra bold */
  transform: translateY(8px);
  line-height: 1;
}

/* LABELS */
.label {
  font-family: 'Bebas Neue', sans-serif; 
  position: absolute;
  bottom: 6px;
  font-size: 13px;
  font-weight: bold;
  text-transform: uppercase;
}

.label.left {
  left: 10px;
}

.label.right {
  right: 10px;
}

/* MONTH BAR */
.month-bar {
  background: #E7B8AF;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 6px 6px 0 0;
}

.arrow {
  cursor: pointer;
  font-size: 16px;
}

/* CALENDAR */
.calendar {
  background: #F8F8F8;
  padding: 12px;
  border-radius: 0 0 6px 6px;
}

.weekdays, .days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
}

/* WEEK HEADER */
.weekdays div {
  font-size: 12px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

/* DAYS */
.days div {
  padding: 6px;
  font-size: 12px;
  font-weight: 500;
}

/* GREY DAYS */
.other-month {
  color: #bbb;
}

/* TODAY */
.today {
  background: #E7B8AF;
  color: white;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

  <!-- CLOCK -->
  <div class="clock">
    <div class="box">
      <div class="time" id="hour">07</div>
      <div class="label left" id="ampm">PM</div>
    </div>

    <div class="box">
      <div class="time" id="minute">57</div>
      <div class="label right" id="day">FRIDAY</div>
    </div>
  </div>

  <!-- MONTH BAR -->
  <div class="month-bar">
    <span class="arrow" onclick="changeMonth(-1)">‹</span>
    <span id="month">April 2026</span>
    <span class="arrow" onclick="changeMonth(1)">›</span>
  </div>

  <!-- CALENDAR -->
  <div class="calendar">
    <div class="weekdays">
      <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
    </div>
    <div class="days" id="days"></div>
  </div>

</div>

<script>
let currentDate = new Date();

function updateClock() {
  const now = new Date();

  let hours = now.getHours();
  const ampm = hours >= 12 ? "PM" : "AM";
  hours = hours % 12 || 12;

  document.getElementById("hour").innerText =
    hours.toString().padStart(2, "0");

  document.getElementById("minute").innerText =
    now.getMinutes().toString().padStart(2, "0");

  document.getElementById("ampm").innerText = ampm;

  document.getElementById("day").innerText =
    now.toLocaleDateString(undefined, { weekday: "long" }).toUpperCase();
}

function generateCalendar(date) {
  const daysContainer = document.getElementById("days");
  daysContainer.innerHTML = "";

  const year = date.getFullYear();
  const month = date.getMonth();

  document.getElementById("month").innerText =
    date.toLocaleDateString(undefined, { month: "long", year: "numeric" });

  const firstDay = new Date(year, month, 1).getDay();
  const totalDays = new Date(year, month + 1, 0).getDate();
  const prevMonthDays = new Date(year, month, 0).getDate();

  const today = new Date();

  /* PREVIOUS MONTH */
  for (let i = firstDay - 1; i >= 0; i--) {
    daysContainer.innerHTML += `<div class="other-month">${prevMonthDays - i}</div>`;
  }

  /* CURRENT MONTH */
  for (let d = 1; d <= totalDays; d++) {
    const isToday =
      d === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear();

    daysContainer.innerHTML += `
      <div class="${isToday ? "today" : ""}">${d}</div>
    `;
  }

  /* AUTO 5 OR 6 ROWS */
  const totalCells = daysContainer.children.length;
  const target = totalCells <= 35 ? 35 : 42;
  const remaining = target - totalCells;

  for (let i = 1; i <= remaining; i++) {
    daysContainer.innerHTML += `<div class="other-month">${i}</div>`;
  }
}

function changeMonth(direction) {
  currentDate.setMonth(currentDate.getMonth() + direction);
  generateCalendar(currentDate);
}

/* INIT */
setInterval(updateClock, 1000);
updateClock();
generateCalendar(currentDate);
</script>

</body>
</html>
